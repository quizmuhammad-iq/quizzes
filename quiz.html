<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a">
<title>كوز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0e1a; color: #e2e8f0; font-family: 'Tajawal', sans-serif; min-height: 100vh; }
.top-bar {
  background: #111827;
  border-bottom: 1px solid #1e2d45;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.btn-back {
  background: #1e2d45;
  border: none;
  color: #e2e8f0;
  width: 38px; height: 38px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.top-title { font-size: 15px; font-weight: 700; }
#quizFrame {
  width: 100%;
  height: calc(100vh - 66px);
  border: none;
}
.loading {
  display: flex; align-items: center; justify-content: center;
  height: calc(100vh - 66px);
  flex-direction: column; gap: 16px;
  color: #64748b;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #1e2d45;
  border-top-color: #00c9a7;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.not-found {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 66px);
  text-align: center; padding: 32px;
}
.not-found .icon { font-size: 56px; margin-bottom: 16px; }
.not-found h2 { color: #f59e0b; margin-bottom: 8px; }
.not-found p { color: #64748b; font-size: 14px; }
</style>
</head>
<body>
<div class="top-bar">
  <button class="btn-back" onclick="history.back()">‹</button>
  <div class="top-title" id="pageTitle">جاري التحميل...</div>
</div>

<div class="loading" id="loadingDiv">
  <div class="spinner"></div>
  <span>جاري تحميل الكوز...</span>
</div>

<div class="not-found" id="notFoundDiv">
  <div class="icon">🔒</div>
  <h2>الملف غير متوفر حالياً</h2>
  <p>سيتم إضافة هذه المحاضرة قريباً</p>
</div>

<iframe id="quizFrame" style="display:none" onload="frameLoaded()"></iframe>

<script>
const SECRET_SALT = "QUIZZES_3RD_YEAR_2025_WAZARIA_SECRET";

function getDeviceId() {
  return localStorage.getItem('device_id') || 'UNKNOWN';
}

function isActivated() {
  const activated = localStorage.getItem('activated');
  const hash = localStorage.getItem('act_hash');
  const deviceId = getDeviceId();
  if (!activated || !hash) return false;
  return hash === btoa(deviceId + SECRET_SALT);
}

if (!isActivated()) {
  window.location.href = 'index.html';
}

const params = new URLSearchParams(window.location.search);
const folder = params.get('folder');
const num = parseInt(params.get('num'));

const folderName = folder === 'patho' ? 'الباثولوجي' : 'فيزياء الرنين';
document.getElementById('pageTitle').textContent = folderName + ' — محاضرة ' + num;

// Try to load the lecture file
const frame = document.getElementById('quizFrame');
frame.src = `lectures/${folder}/lecture_${num}.html`;

function frameLoaded() {
  document.getElementById('loadingDiv').style.display = 'none';
  try {
    // Check if page loaded correctly
    const content = frame.contentDocument || frame.contentWindow.document;
    if (!content || content.title === '404') {
      showNotFound();
      return;
    }
    frame.style.display = 'block';
  } catch(e) {
    frame.style.display = 'block';
    document.getElementById('loadingDiv').style.display = 'none';
  }
}

frame.onerror = function() {
  showNotFound();
};

function showNotFound() {
  document.getElementById('loadingDiv').style.display = 'none';
  document.getElementById('notFoundDiv').style.display = 'flex';
}

// Timeout fallback
setTimeout(() => {
  if (frame.style.display === 'none') {
    showNotFound();
  }
}, 8000);
</script>
</body>
</html>
