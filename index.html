<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="كوزات الثالثة">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.jpg">
<title>كوزات المرحلة الثالثة الوزارية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a; --card: #111827; --card2: #0d1420; --border: #1e2d45;
  --accent: #00c9a7; --accent2: #0ea5e9; --gold: #f59e0b; --danger: #ef4444;
  --text: #e2e8f0; --muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; min-height: 100vh; overflow-x: hidden; }
#lockScreen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at 30% 20%, #00c9a715 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, #0ea5e915 0%, transparent 60%), var(--bg); }
.lock-logo { width: 110px; height: 110px; border-radius: 28px; object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 40px #00c9a733; }
.lock-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
.lock-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 32px; }
.lock-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 28px; width: 100%; max-width: 400px; }
.price-badge { background: linear-gradient(135deg, #f59e0b22, #f59e0b11); border: 1px solid #f59e0b44; border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 24px; }
.price-badge .amount { font-size: 32px; font-weight: 800; color: var(--gold); }
.input-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; display: block; }
.code-input { width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 20px; font-weight: 700; color: var(--text); text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
.code-input:focus { border-color: var(--accent); }
.code-input.error { border-color: var(--danger); }
.btn-activate { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 16px; }
.btn-tg { width: 100%; background: #0088cc22; border: 1px solid #0088cc44; color: #0088cc; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; text-decoration: none; display: block; text-align: center; }
.err-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 10px; display: none; }
#mainApp { display: none; }
header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
header img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
.header-text h1 { font-size: 15px; font-weight: 800; }
.section { padding: 20px 16px 80px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; width: 3px; height: 16px; border-radius: 2px; display: inline-block; }
.patho .section-title::before { background: var(--accent); }
.mri .section-title::before { background: var(--gold); }
.lecture-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; text-decoration: none; color: var(--text); }
.lec-num { width: 40px; height: 40px; min-width: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
.patho .lec-num { background: #00c9a722; color: var(--accent); }
.mri .lec-num { background: #f59e0b22; color: var(--gold); }
.lec-info { flex: 1; }
.lec-name { font-size: 14px; font-weight: 600; }
.lec-sub { font-size: 11px; color: var(--muted); }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 11px; }
.nav-btn.active { color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<div id="lockScreen">
  <img class="lock-logo" src="icon.jpg">
  <div class="lock-title">كوزات المرحلة الثالثة الوزارية</div>
  <div class="lock-sub">قسم تقنيات الأشعة</div>
  <div class="lock-card">
    <div class="price-badge"><div class="amount">1,000 دينار</div></div>
    <label class="input-label">أدخل كود التفعيل</label>
    <input class="code-input" id="codeInput" type="text" placeholder="XXXX-XXXX" maxlength="9">
    <button class="btn-activate" onclick="tryActivate()">🔓 تفعيل</button>
    <a class="btn-tg" href="https://t.me/f_8e5" target="_blank">✈️ تواصل معنا للدفع</a>
    <div class="err-msg" id="errMsg">❌ الكود غير صحيح</div>
  </div>
</div>

<div id="mainApp">
  <header>
    <img src="icon.jpg">
    <div class="header-text"><h1>كوزات المرحلة الثالثة</h1><p>الوزارية — تقنيات الأشعة</p></div>
  </header>
  <div class="tab-content active" id="tabQuizzes">
    <div class="section patho">
      <div class="section-title">🔬 الباثولوجي — 7 محاضرات</div>
      <div id="pathoList"></div>
    </div>
    <div class="section mri">
      <div class="section-title">🧲 فيزياء الرنين — 15 محاضرة</div>
      <div id="mriList"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('Quizzes', this)"><span>📚</span>الكوزات</button>
    <button class="nav-btn" onclick="alert('قريباً')"><span>ℹ️</span>عن التطبيق</button>
  </nav>
</div>

<script>
// --- Service Worker Registration ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('SW Registered');
    }).catch(err => console.log('SW Failed', err));
  });
}

const SECRET_SALT = "QUIZZES_3RD_YEAR_2025_WAZARIA_SECRET";

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function getDeviceId() {
  let id = localStorage.getItem('device_id');
  if (!id) {
    id = Math.random().toString(16).substr(2, 8).toUpperCase();
    localStorage.setItem('device_id', id);
  }
  return id;
}

async function tryActivate() {
  const entered = document.getElementById('codeInput').value.trim().toUpperCase();
  const deviceId = getDeviceId();
  const hash = await sha256(deviceId + SECRET_SALT);
  const correct = hash.substring(0, 4).toUpperCase() + '-' + hash.substring(4, 8).toUpperCase();

  if (entered === correct) {
    localStorage.setItem('activated', 'true');
    localStorage.setItem('act_hash', btoa(deviceId + SECRET_SALT));
    showApp();
  } else {
    document.getElementById('errMsg').style.display = 'block';
  }
}

function showApp() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  buildList(7, 'pathoList', 'patho', 'patho');
  buildList(15, 'mriList', 'mri', 'mri');
}

function buildList(count, containerId, folder, colorClass) {
  const container = document.getElementById(containerId);
  for (let i = 1; i <= count; i++) {
    const div = document.createElement('div');
    div.className = 'lecture-card ' + colorClass;
    div.innerHTML = `<div class="lec-num">${i}</div><div class="lec-info"><div class="lec-name">محاضرة ${i}</div><div class="lec-sub">${folder}</div></div><div>›</div>`;
    div.onclick = () => window.location.href = `quiz.html?folder=${folder}&num=${i}`;
    container.appendChild(div);
  }
}

if (localStorage.getItem('activated') === 'true') showApp();

document.getElementById('codeInput').addEventListener('input', function(e) {
  let val = e.target.value.replace(/[^A-Z0-9]/g, '');
  if (val.length > 4) val = val.substring(0,4) + '-' + val.substring(4,8);
  e.target.value = val;
});
</script>
</body>
</html>
