<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>كوز</title>
<style>
body { background: #0a0e1a; color: #e2e8f0; font-family: sans-serif; margin: 0; }
.top-bar { background: #111827; padding: 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1e2d45; }
.btn-back { background: #1e2d45; border: none; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
#quizFrame { width: 100%; height: calc(100vh - 60px); border: none; }
</style>
</head>
<body>
<div class="top-bar"><button class="btn-back" onclick="history.back()">عودة</button><div id="title">جاري التحميل...</div></div>
<iframe id="quizFrame"></iframe>
<script>
const params = new URLSearchParams(window.location.search);
const folder = params.get('folder');
const num = params.get('num');
document.getElementById('title').textContent = `محاضرة ${num}`;
document.getElementById('quizFrame').src = `lectures/${folder}/lecture_${num}.html`;
</script>
</body>
</html>
